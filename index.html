<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>显化实验室 Pro | Manifest Lab</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-dark: #0f0f1a;
            --card-bg: #1e1e2f;
            --text-main: #e0e0e0;
            --accent-purple: #7000ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: var(--primary-gold);
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .input-group {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--primary-gold);
        }

        textarea, input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            padding: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        textarea:focus, input:focus {
            border-color: var(--primary-gold);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #D4AF37, #f9d976);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            margin-bottom: 15px;
        }

        button:active { transform: scale(0.98); }

        .history-title {
            margin: 30px 0 15px;
            font-size: 1.2rem;
            color: var(--primary-gold);
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wish-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-gold);
            animation: slideIn 0.5s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wish-card .tag {
            font-size: 0.7rem;
            background: var(--accent-purple);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 5px;
        }

        .wish-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; color: #fff; }
        .wish-card p { font-size: 0.95rem; color: #ccc; margin: 8px 0; line-height: 1.6; }
        .wish-card .meta { font-size: 0.8rem; color: #666; margin-top: 15px; }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #666;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .export-section {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .secondary-btn {
            background: transparent;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            flex: 1;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ 显化实验室 Pro ✨</h1>

    <div class="input-group">
        <label>1. 显化实相（细节描述）</label>
        <textarea id="vision" placeholder="例如：我正坐在新办公室里，阳光洒在桌上..." rows="3"></textarea>
    </div>

    <div class="input-group">
        <label>2. 超真实情绪锚点</label>
        <textarea id="emotion" placeholder="感受那种心跳、如释重负或纯粹的喜悦..." rows="2"></textarea>
    </div>

    <div class="input-group">
        <label>3. 三个物理行动锚点</label>
        <input type="text" id="action1" placeholder="动作一" style="margin-bottom:8px;">
        <input type="text" id="action2" placeholder="动作二" style="margin-bottom:8px;">
        <input type="text" id="action3" placeholder="动作三">
    </div>

    <button onclick="manifestNow()">向宇宙发射愿望 🚀</button>

    <div class="history-title">
        <span>我的显化清单</span>
    </div>

    <div id="historyList">
        </div>

    <div class="export-section">
        <button class="secondary-btn" onclick="exportData()">导出数据</button>
        <button class="secondary-btn" onclick="clearAll()" style="color:#ff4444; border-color:#ff4444;">清空全部</button>
    </div>
</div>

<script>
    // 初始化加载
    window.onload = displayWishes;

    function manifestNow() {
        const vision = document.getElementById('vision').value;
        const emotion = document.getElementById('emotion').value;
        const actions = [
            document.getElementById('action1').value,
            document.getElementById('action2').value,
            document.getElementById('action3').value
        ];

        if(!vision) {
            alert("请先填写愿望实相");
            return;
        }

        const wish = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            vision: vision,
            emotion: emotion,
            actions: actions.filter(a => a !== '') // 只保存填了的行动
        };

        // 存储
        let wishes = JSON.parse(localStorage.getItem('myWishes') || '[]');
        wishes.unshift(wish);
        localStorage.setItem('myWishes', JSON.stringify(wishes));

        // 反馈：震动 + 清空 + 刷新列表
        if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
        
        document.querySelectorAll('textarea, input').forEach(el => el.value = '');
        displayWishes();
        
        // 滚动到列表位置
        document.getElementById('historyList').scrollIntoView({ behavior: 'smooth' });
    }

    function displayWishes() {
        const list = document.getElementById('historyList');
        const wishes = JSON.parse(localStorage.getItem('myWishes') || '[]');
        
        if(wishes.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#666; margin-top:20px;">暂无发射记录，等待宇宙订单...</p>';
            return;
        }

        list.innerHTML = wishes.map(w => `
            <div class="wish-card">
                <span class="delete-btn" onclick="deleteWish(${w.id})">删除</span>
                <h3>${w.vision}</h3>
                <p><span class="tag" style="background:#2d5a27">情绪</span> ${w.emotion}</p>
                <p><span class="tag">行动</span> ${w.actions.join(' | ')}</p>
                <div class="meta">发射于：${w.date}</div>
            </div>
        `).join('');
    }

    function deleteWish(id) {
        if(confirm('确定要移除这个愿望吗？这不会取消你的显化，只是清理列表。')) {
            let wishes = JSON.parse(localStorage.getItem('myWishes') || '[]');
            wishes = wishes.filter(w => w.id !== id);
            localStorage.setItem('myWishes', JSON.stringify(wishes));
            displayWishes();
        }
    }

    function exportData() {
        const data = localStorage.getItem('myWishes') || '[]';
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `显化记录_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function clearAll() {
        if(confirm('警告：这将清空所有本地记录，确定吗？')) {
            localStorage.removeItem('myWishes');
            displayWishes();
        }
    }
</script>

</body>
</html>
